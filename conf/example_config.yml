# Lynx tracer runtime example
#
# The current runtime scans only the nested `lynx.tracer` block.
# Use `addr: "None"` when you want context propagation without exporting spans.

lynx:
  tracer:
    enable: true
    addr: "otel-collector:4317"
    ratio: 1.0
    config:
      protocol: OTLP_GRPC
      insecure: true
      compression: COMPRESSION_GZIP
      timeout: 10s

      retry:
        enabled: true
        max_attempts: 3
        initial_interval: 100ms
        max_interval: 5s

      connection:
        connect_timeout: 10s
        reconnection_period: 5s

      load_balancing:
        policy: "round_robin"
        health_check: true

      batch:
        enabled: true
        max_queue_size: 2048
        scheduled_delay: 200ms
        export_timeout: 30s
        max_batch_size: 512

      sampler:
        type: PARENT_BASED_TRACEID_RATIO
        ratio: 0.1

      propagators:
        - W3C_TRACE_CONTEXT
        - W3C_BAGGAGE
        - B3

      resource:
        service_name: "my-service"
        attributes:
          deployment.environment: "production"
          team: "platform"

      limits:
        attribute_count_limit: 128
        attribute_value_length_limit: 2048
        event_count_limit: 128
        link_count_limit: 128

      # Used only when protocol is OTLP_HTTP.
      http_path: "/v1/traces"

      # Optional TLS or mTLS settings for secure collectors.
      tls:
        ca_file: "/etc/ssl/certs/otel-ca.pem"
        cert_file: "/etc/ssl/certs/otel-client.pem"
        key_file: "/etc/ssl/private/otel-client.key"
        insecure_skip_verify: false
